<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authorization Successful</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; }
  .icon { font-size: 64px; color: #22c55e; line-height: 1; margin-bottom: 16px; }
  h1 { margin: 0 0 12px; font-size: 24px; color: #1a202c; }
  p { color: #4a5568; margin: 0 0 8px; line-height: 1.6; }
  .meta { background: #f7fafc; border-radius: 8px; padding: 16px; margin: 24px 0; text-align: left; font-size: 14px; color: #4a5568; }
  .meta strong { color: #2d3748; display: inline-block; min-width: 120px; }
  .close-note { font-size: 13px; color: #718096; margin-top: 24px; }
  #countdown { font-weight: bold; color: #3b82f6; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#10003;</div>
  <h1>Authorization Successful</h1>
  <p>YouTube Uploader has been granted access to your YouTube account.</p>
  <div class="meta">
    <div><strong>Token saved to:</strong> {{.TokenPath}}</div>
  </div>
  <p class="close-note">You can safely close this window.<br>Closing automatically in <span id="countdown">5</span> seconds...</p>
</div>
<script>
  var s = 5;
  var t = setInterval(function() {
    s--;
    document.getElementById('countdown').textContent = s;
    if (s <= 0) { clearInterval(t); window.close(); }
  }, 1000);
</script>
</body>
</html>
